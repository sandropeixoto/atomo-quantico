<svg width="1024" height="1024" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#0D0B1A"/>
  <defs>
    <linearGradient id="orbitGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stopColor="rgba(123,97,255,0.2)" />
      <stop offset="50%" stopColor="rgba(123,97,255,0.5)" />
      <stop offset="100%" stopColor="rgba(123,97,255,0.2)" />
    </linearGradient>
    <radialGradient id="nucleusGradient">
      <stop offset="0%" stopColor="#A78BFA" />
      <stop offset="100%" stopColor="#7C3AED" />
    </radialGradient>
  </defs>
  
  <g transform="rotate(0 50 50)">
    <ellipse cx="50" cy="50" rx="40" ry="14" stroke="url(#orbitGradient)" strokeWidth="1"/>
    <circle cx="90" cy="50" r="2.5" fill="#C084FC"/>
  </g>
  <g transform="rotate(60 50 50)">
    <ellipse cx="50" cy="50" rx="40" ry="14" stroke="url(#orbitGradient)" strokeWidth="1"/>
    <circle cx="90" cy="50" r="2.5" fill="#C084FC"/>
  </g>
  <g transform="rotate(120 50 50)">
    <ellipse cx="50" cy="50" rx="40" ry="14" stroke="url(#orbitGradient)" strokeWidth="1"/>
    <circle cx="90" cy="50" r="2.5" fill="#C084FC"/>
  </g>
  <circle cx="50" cy="50" r="8" fill="url(#nucleusGradient)"/>
</svg>
